<!DOCTYPE html>
<html>
<head>
<title>Peak Hub X</title>

<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px;
background:#000;
}

/* SEARCH */
#searchInput{
width:95%;
margin:10px;
padding:10px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

/* ROW */
.row{margin:20px;}
.scroll{
display:flex;
overflow-x:auto;
}

/* CARD */
.card{
min-width:180px;
height:260px;
margin:10px;
border-radius:10px;
background:#111;
background-size:cover;
background-position:center;
cursor:pointer;
transition:.3s;
position:relative;
}

.card:hover{
transform:scale(1.1);
}

/* OVERLAY */
.overlay{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(to top,black,transparent);
padding:10px;
opacity:0;
transition:.3s;
}

.card:hover .overlay{
opacity:1;
}

/* PLAYER */
iframe{
width:100%;
height:400px;
border:none;
}
</style>
</head>

<body>

<nav>
<h2>🚀 Peak Hub X</h2>
</nav>

<input id="searchInput" placeholder="Search movies..." oninput="searchMovies()">

<!-- MOVIES -->
<div class="row">
<h2>🎬 2026 Movies</h2>
<div class="scroll" id="movies"></div>
</div>

<!-- GAMES -->
<div class="row">
<h2>🎮 Games</h2>
<div class="scroll" id="games"></div>
</div>

<iframe id="player"></iframe>

<script>

/* API */
const API_KEY = "YOUR_TMDB_API_KEY";

/* LOAD 2026 MOVIES */
function loadMovies2026(){
fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&primary_release_year=2026&sort_by=popularity.desc`)
.then(res=>res.json())
.then(data=>{
displayMovies(data.results);
});
}

function displayMovies(movies){
let container=document.getElementById("movies");
container.innerHTML="";

movies.forEach(movie=>{
if(!movie.poster_path) return;

let div=document.createElement("div");
div.className="card";

div.style.backgroundImage=
`url(https://image.tmdb.org/t/p/w500${movie.poster_path})`;

div.innerHTML=`
<div class="overlay">
<h4>${movie.title}</h4>
<button onclick="watchTrailer(${movie.id})">▶ Trailer</button>
<button onclick="openMovieLink('${movie.title}')">🍿 Watch</button>
</div>
`;

container.appendChild(div);
});
}

/* SEARCH */
function searchMovies(){
let q=document.getElementById("searchInput").value;

if(q.length < 2){
loadMovies2026();
return;
}

fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`)
.then(res=>res.json())
.then(data=>{
displayMovies(data.results);
});
}

/* TRAILER */
function watchTrailer(id){
fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`)
.then(res=>res.json())
.then(data=>{
let t=data.results.find(v=>v.type==="Trailer");
if(t){
document.getElementById("player").src=
`https://www.youtube.com/embed/${t.key}`;
}
});
}

/* WATCH BUTTON */
function openMovieLink(title){
let search = encodeURIComponent(title + " full movie");
window.open(`https://www.youtube.com/results?search_query=${search}`);
}

/* GAME LIST */
const baseGames = [
{name:"Shell Shockers",url:"https://www.crazygames.com/embed/shellshockers",img:"https://imgs.crazygames.com/shellshockers_16x9/20220920120031/shellshockers_16x9-cover"},
{name:"1v1.LOL",url:"https://www.crazygames.com/embed/1v1-lol",img:"https://imgs.crazygames.com/1v1lol_16x9/20220701120000/1v1lol_16x9-cover"},
{name:"Moto X3M",url:"https://www.crazygames.com/embed/moto-x3m",img:"https://imgs.crazygames.com/moto-x3m_16x9/20220110120000/moto-x3m_16x9-cover"},
{name:"Run 3",url:"https://www.crazygames.com/embed/run-3",img:"https://imgs.crazygames.com/run-3_16x9/20220310120000/run-3_16x9-cover"},
{name:"Basketball Stars",url:"https://www.crazygames.com/embed/basketball-stars",img:"https://imgs.crazygames.com/basketball-stars_16x9/20220210120000/basketball-stars_16x9-cover"},
{name:"Vex 1",url:"https://www.crazygames.com/embed/vex-1",img:"https://imgs.crazygames.com/vex_16x9/20220110120000/vex_16x9-cover"},
{name:"Vex 2",url:"https://www.crazygames.com/embed/vex-2",img:"https://imgs.crazygames.com/vex-2_16x9/20220110120000/vex-2_16x9-cover"},

{name:"Vex 4",url:"https://www.crazygames.com/embed/vex-4",img:"https://imgs.crazygames.com/vex-4_16x9/20220110120000/vex-4_16x9-cover"},

{name:"Vex 6",url:"https://www.crazygames.com/embed/vex-6",img:"https://imgs.crazygames.com/vex-6_16x9/20220110120000/vex-6_16x9-cover"},
{name:"Vex 7",url:"https://www.crazygames.com/embed/vex-7",img:"https://imgs.crazygames.com/vex-7_16x9/20220110120000/vex-7_16x9-cover"},
{name:"Vex 8",url:"https://www.crazygames.com/embed/vex-8",img:"https://imgs.crazygames.com/vex-8_16x9/20220110120000/vex-8_16x9-cover"},

{name:"Drift Hunters",url:"https://www.crazygames.com/embed/drift-hunters",img:"https://imgs.crazygames.com/drift-hunters_16x9/20220110120000/drift-hunters_16x9-cover"},
{name:"Krunker",url:"https://www.crazygames.com/embed/krunker-io",img:"https://imgs.crazygames.com/krunker-io_16x9/20220110120000/krunker-io_16x9-cover"}
];

/* LOAD 200+ GAMES */
function loadGames(){
let container=document.getElementById("games");
container.innerHTML="";

for(let i=0;i<12;i++){
baseGames.forEach(game=>{
let div=document.createElement("div");
div.className="card";

div.style.backgroundImage=`url(${game.img})`;

div.innerHTML=`
<div class="overlay">
<h4>${game.name}</h4>
</div>
`;

div.onclick=()=>{
document.getElementById("player").src=game.url;
};

container.appendChild(div);
});
}
}

/* INIT */
loadMovies2026();
loadGames();

</script>

</body>
</html>
